<svg width="600" height="500" viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background shapes -->
  <circle cx="100" cy="80" r="60" fill="#E0E7FF" opacity="0.5"/>
  <circle cx="520" cy="420" r="70" fill="#FEF3C7" opacity="0.5"/>
  
  <!-- Main collaboration illustration -->
  <g transform="translate(150,100)">
    <!-- Center screen/board -->
    <rect x="80" y="50" rx="15" ry="15" width="240" height="200" fill="#1E293B" filter="url(#shadow)"/>
    <rect x="95" y="70" rx="10" ry="10" width="210" height="140" fill="#0F172A"/>
    
    <!-- Screen content - charts and data -->
    <rect x="110" y="90" width="60" height="80" rx="6" fill="url(#grad1)" opacity="0.8"/>
    <rect x="180" y="110" width="60" height="60" rx="6" fill="url(#grad2)" opacity="0.8"/>
    <rect x="250" y="95" width="40" height="75" rx="6" fill="#10B981" opacity="0.8"/>
    
    <!-- Bottom info bar -->
    <circle cx="120" cy="230" r="8" fill="#6366F1"/>
    <rect x="135" y="225" width="150" height="10" rx="5" fill="#E2E8F0"/>
    
    <!-- Person 1 (left) -->
    <g transform="translate(20,180)">
      <circle cx="30" cy="30" r="28" fill="url(#grad1)"/>
      <circle cx="30" cy="26" r="10" fill="#fff"/>
      <path d="M 15 45 Q 30 55 45 45" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
    
    <!-- Person 2 (right) -->
    <g transform="translate(330,180)">
      <circle cx="30" cy="30" r="28" fill="url(#grad2)"/>
      <circle cx="30" cy="26" r="10" fill="#fff"/>
      <path d="M 15 45 Q 30 55 45 45" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
    
    <!-- Person 3 (center bottom) -->
    <g transform="translate(175,240)">
      <circle cx="25" cy="25" r="24" fill="#10B981"/>
      <circle cx="25" cy="22" r="9" fill="#fff"/>
      <path d="M 12 38 Q 25 46 38 38" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Floating icons -->
  <g opacity="0.9">
    <circle cx="80" cy="280" r="22" fill="#6366F1"/>
    <path d="M 70 280 L 75 285 L 88 272" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <g opacity="0.9">
    <circle cx="520" cy="150" r="22" fill="#F59E0B"/>
    <circle cx="520" cy="150" r="10" stroke="#fff" stroke-width="3" fill="none"/>
    <circle cx="520" cy="150" r="4" fill="#fff"/>
  </g>
  
  <g opacity="0.85">
    <rect x="60" y="400" width="48" height="48" rx="12" fill="#8B5CF6"/>
    <path d="M 75 418 L 84 427 L 93 418 M 84 427 L 84 412" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <g opacity="0.85">
    <rect x="490" cy="300" width="48" height="48" rx="12" fill="#10B981"/>
    <circle cx="514" cy="318" r="8" stroke="#fff" stroke-width="2.5" fill="none"/>
    <path d="M 514 318 L 514 332 M 508 326 L 514 332 L 520 326" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>