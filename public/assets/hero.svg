<svg width="700" height="500" viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background decorative waves -->
  <rect width="700" height="500" fill="none"/>
  <path d="M0,280 C180,220 260,350 420,310 C540,280 620,310 700,290 L700,500 L0,500 Z" fill="url(#grad)" opacity="0.15"/>
  <path d="M0,240 C160,190 280,320 460,270 C560,240 640,270 700,250 L700,500 L0,500 Z" fill="url(#grad)" opacity="0.12"/>
  
  <!-- Main device (laptop) -->
  <g transform="translate(160,120)" filter="url(#shadow)">
    <rect x="0" y="0" rx="18" ry="18" width="380" height="240" fill="#1E293B"/>
    <rect x="14" y="18" rx="12" ry="12" width="352" height="180" fill="#0F172A"/>
    <rect x="14" y="18" rx="12" ry="12" width="352" height="180" fill="url(#glass)"/>
    
    <!-- Code window header -->
    <circle cx="32" cy="36" r="6" fill="#EF4444"/>
    <circle cx="48" cy="36" r="6" fill="#F59E0B"/>
    <circle cx="64" cy="36" r="6" fill="#10B981"/>

    <!-- Code lines -->
    <rect x="32" y="60" width="120" height="12" rx="6" fill="#6366F1"/>
    <rect x="32" y="84" width="200" height="10" rx="5" fill="#A5B4FC"/>
    <rect x="32" y="106" width="150" height="10" rx="5" fill="#C7D2FE"/>
    <rect x="32" y="128" width="220" height="10" rx="5" fill="#A5B4FC"/>
    <rect x="32" y="150" width="180" height="10" rx="5" fill="#C7D2FE"/>

    <!-- Right panel widgets -->
    <rect x="260" y="60" width="90" height="70" rx="10" fill="#111827" stroke="#374151"/>
    <rect x="270" y="72" width="70" height="10" rx="5" fill="#8B5CF6"/>
    <rect x="270" y="90" width="70" height="10" rx="5" fill="#A78BFA"/>
    <rect x="270" y="108" width="50" height="10" rx="5" fill="#DDD6FE"/>

    <!-- Bottom bar -->
    <rect x="0" y="210" width="380" height="16" rx="8" fill="#111827"/>
  </g>

  <!-- Floating elements -->
  <g>
    <circle cx="540" cy="110" r="24" fill="url(#grad)" opacity="0.9"/>
    <rect x="530" y="148" width="70" height="24" rx="12" fill="#8B5CF6" opacity="0.85"/>
    <text x="565" y="166" font-family="Poppins, Arial" font-size="12" fill="#fff" text-anchor="middle">{ }</text>

    <g transform="translate(110,90)">
      <rect x="0" y="0" width="54" height="24" rx="12" fill="#6366F1"/>
      <text x="27" y="16" font-family="Poppins, Arial" font-size="12" fill="#fff" text-anchor="middle">UI</text>
    </g>

    <g transform="translate(520,260)">
      <circle cx="0" cy="0" r="26" fill="#8B5CF6"/>
      <circle cx="0" cy="0" r="14" fill="#fff"/>
      <rect x="-2" y="-9" width="4" height="18" fill="#8B5CF6"/>
      <rect x="-9" y="-2" width="18" height="4" fill="#8B5CF6"/>
    </g>
  </g>

  <!-- Title badge -->
  <g transform="translate(40,40)" filter="url(#shadow)">
    <rect x="0" y="0" rx="14" ry="14" width="200" height="46" fill="url(#grad)"/>
    <text x="100" y="30" font-family="Poppins, Arial" font-size="18" fill="#fff" text-anchor="middle" font-weight="700">AQ Digital</text>
  </g>
</svg>